services:
  bulwarc:
    build:
      context: .
      args:
        VITE_API_URL: /api
        VITE_BULWARC_ADDRESS: ${VITE_BULWARC_ADDRESS}
        VITE_ORACLE_ADDRESS: ${VITE_ORACLE_ADDRESS}
        VITE_RPC_URL: ${VITE_RPC_URL:-https://rpc.testnet.arc.network}
        VITE_CHAIN_ID: ${VITE_CHAIN_ID:-5042002}
    ports:
      - "80:80"
    environment:
      - BULWARC_ADDRESS=${VITE_BULWARC_ADDRESS}
      - ORACLE_ADDRESS=${VITE_ORACLE_ADDRESS}
      - RPC_URL=${VITE_RPC_URL:-https://rpc.testnet.arc.network}
      - PORT=3001
      - DEPLOY_BLOCK=${DEPLOY_BLOCK:-35509000}
      - AI_AGENT_PRIVATE_KEY=${AI_AGENT_PRIVATE_KEY}
      - DB_PATH=/app/backend/data/bulwarc.db
    volumes:
      - bulwarc-data:/app/backend/data
    restart: unless-stopped

volumes:
  bulwarc-data:
