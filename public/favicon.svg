<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- Shield shape with neon glow -->
  <defs>
    <linearGradient id="shieldGrad" x1="24" y1="2" x2="24" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Dark background -->
  <rect width="48" height="48" rx="10" fill="#0a0a0f"/>
  <!-- Shield outline with gradient -->
  <path d="M24 4L8 12v12c0 10.5 6.8 17.2 16 22 9.2-4.8 16-11.5 16-22V12L24 4z"
    stroke="url(#shieldGrad)" stroke-width="2.5" fill="none" filter="url(#glow)"/>
  <!-- Inner B letter -->
  <text x="24" y="31" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="18" fill="#f5a623" filter="url(#glow)">B</text>
</svg>
