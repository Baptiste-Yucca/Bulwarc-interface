services:
  bulwarc:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
        - VITE_BULWARC_ADDRESS=${VITE_BULWARC_ADDRESS:-0xA23B7bdf94717Ae9A0d0C468Ad84fDD0D485ea1d}
        - VITE_ORACLE_ADDRESS=${VITE_ORACLE_ADDRESS:-0x3462614cd401DD667B3A30D1c7E8b731DCE7E003}
        - VITE_RPC_URL=${VITE_RPC_URL:-https://rpc.testnet.arc.network}
        - VITE_CHAIN_ID=${VITE_CHAIN_ID:-5042002}
    container_name: bulwarc
    volumes:
      - ./data:/app/backend/data
    environment:
      - NODE_ENV=production
      - BULWARC_ADDRESS=${VITE_BULWARC_ADDRESS:-0xA23B7bdf94717Ae9A0d0C468Ad84fDD0D485ea1d}
      - ORACLE_ADDRESS=${VITE_ORACLE_ADDRESS:-0x3462614cd401DD667B3A30D1c7E8b731DCE7E003}
      - RPC_URL=${VITE_RPC_URL:-https://rpc.testnet.arc.network}
      - PORT=3001
      - DEPLOY_BLOCK=${DEPLOY_BLOCK:-35509000}
      - AI_AGENT_PRIVATE_KEY=${AI_AGENT_PRIVATE_KEY}
      - DB_PATH=/app/backend/data/bulwarc.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/shields && curl -sf http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_default"

      # HTTP -> HTTPS redirect
      - "traefik.http.routers.bulwarc-http.rule=Host(`bulwarc.battistu.com`)"
      - "traefik.http.routers.bulwarc-http.entrypoints=web"
      - "traefik.http.routers.bulwarc-http.middlewares=redirect-to-https@file"

      # HTTPS
      - "traefik.http.routers.bulwarc.rule=Host(`bulwarc.battistu.com`)"
      - "traefik.http.routers.bulwarc.entrypoints=websecure"
      - "traefik.http.routers.bulwarc.tls.certresolver=letsencrypt"

      # Nginx serves both SPA (:80) and proxies /api to backend (:3001)
      - "traefik.http.services.bulwarc.loadbalancer.server.port=80"
    networks:
      - traefik

networks:
  traefik:
    external: true
    name: traefik_default
